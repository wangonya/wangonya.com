{{ define "main" }}
{{ .Content }}
<nav>
  <ul class="horizontal-list">
    {{ range where site.Menus.links ".Params.home" true }}
    <li><a href="{{ .URL }}">{{ .Name }}</a></li>
    {{ end }}
  </ul>
</nav>
<ul class="blog-list">
  {{ range site.RegularPages }}
  <li class="blog-list-item">
    <time>{{ .Date.Format "01/06" }}</time>
    <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
