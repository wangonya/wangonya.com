{{ define "main" }}
{{ .Content }}
<ul class="blog-list">
  {{ range where site.RegularPages "Params.archived" "ne" true }}
  <li class="blog-list-item">
    <span class="blog-list-date">{{ .Date.Format "01/06" }}</span>
    <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
